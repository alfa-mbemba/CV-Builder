<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable CV - Two Column CRUD Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            padding: 40px 24px;
            color: #1e293b;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .sub {
            text-align: center;
            color: #475569;
            margin-bottom: 40px;
            border-bottom: 2px solid #cbd5e1;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 8px;
        }

        /* two column grid */
        .cv-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        /* card style */
        .section-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 28px;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .card-header {
            background: #f8fafc;
            padding: 18px 24px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0f172a;
        }

        .card-header h2 i {
            color: #3b82f6;
            font-size: 1.3rem;
        }

        .btn-add {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        .items-list {
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .item {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 16px 20px;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .item:hover {
            border-color: #b9d0f0;
            background: #fefefe;
        }

        .item-content {
            word-wrap: break-word;
        }

        .item-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .item-detail {
            color: #334155;
            font-size: 0.9rem;
            line-height: 1.45;
            white-space: pre-line;
        }

        .item-actions {
            margin-top: 12px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-edit, .btn-delete {
            border: none;
            background: transparent;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-edit {
            color: #2563eb;
            background: #eff6ff;
        }

        .btn-edit:hover {
            background: #dbeafe;
        }

        .btn-delete {
            color: #dc2626;
            background: #fef2f2;
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        /* modal form */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 28px 30px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.2s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 18px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }

        .modal-content textarea {
            min-height: 90px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 10px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-save {
            background: #10b981;
            color: white;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #1e293b;
        }

        footer {
            text-align: center;
            margin-top: 48px;
            color: #5b6e8c;
            font-size: 0.8rem;
        }

        @media (max-width: 900px) {
            .cv-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            body {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-file-alt"></i> Interactive CV Builder</h1>
    <div style="text-align:center"><span class="sub">Full CRUD • Two Columns • Editable Sections</span></div>

    <div class="cv-grid" id="cvGrid"></div>
    <footer>✨ Add, Edit, Delete any entry. All data saved in MySQL database.</footer>
</div>

<!-- Modal dialog for create/edit -->
<div id="itemModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Entry</h3>
        <input type="hidden" id="modalSection" value="">
        <input type="hidden" id="modalId" value="">
        <input type="text" id="entryTitle" placeholder="Title (e.g., 'BSc Computer Science', 'JavaScript', 'Google Inc.')" required>
        <textarea id="entryDescription" placeholder="Description / Details (e.g., institution name, years, achievements, or extra info)"></textarea>
        <div class="modal-buttons">
            <button class="btn-cancel" id="modalCancelBtn">Cancel</button>
            <button class="btn-save" id="modalSaveBtn">Save</button>
        </div>
    </div>
</div>

<script>
    // ---------- CONFIG ----------
    // We'll assume PHP backend with MySQL.
    // For brevity, define API endpoints. We will use fetch to /api.php
    // Because the requirement includes PHP & MySQL, we provide the PHP code below.
    // But here we write the frontend JS that interacts with the backend.
    // For local testing we must create api.php and database.
    // The answer will include full SQL + PHP code separately.
    
    // Define sections that appear in two columns.
    // Each section has a unique key, display name, icon, and column placement (0 left, 1 right)
    const sectionsConfig = [
        { key: "personal_info", label: "📌 Personal Info", icon: "fas fa-user", column: 0 },
        { key: "education", label: "🎓 Education Background", icon: "fas fa-graduation-cap", column: 0 },
        { key: "job_experiences", label: "💼 Job Experiences", icon: "fas fa-briefcase", column: 0 },
        { key: "programming_languages", label: "💻 Programming Languages", icon: "fas fa-code", column: 1 },
        { key: "hobbies", label: "🎨 Hobbies", icon: "fas fa-palette", column: 1 },
        { key: "referees", label: "📞 Referees", icon: "fas fa-address-card", column: 1 },
        { key: "role_models", label: "🌟 Role Models", icon: "fas fa-star", column: 1 }
    ];
    
    // Additional dynamic sections? but we cover all required.
    // State: store entries per section.
    let appData = {};

    // API Helper
    async function apiRequest(endpoint, method, body = null) {
        const options = {
            method: method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`api.php?action=${endpoint}`, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    // Load all data from server
    async function loadAllData() {
        try {
            const result = await apiRequest('fetchAll', 'GET');
            if (result.success && result.data) {
                appData = result.data;
                renderCV();
            } else {
                console.warn("No data or init", result);
                // initialize empty sections
                for (let cfg of sectionsConfig) {
                    if (!appData[cfg.key]) appData[cfg.key] = [];
                }
                renderCV();
            }
        } catch (err) {
            console.error("Error loading data:", err);
            // Fallback: empty demo data to show UI
            for (let cfg of sectionsConfig) {
                appData[cfg.key] = [];
            }
            renderCV();
            alert("Could not connect to backend. Please ensure PHP + MySQL is running. Check api.php setup.");
        }
    }

    // add / update item
    async function saveItem(section, id, title, description) {
        const payload = { section, id, title, description };
        try {
            const result = await apiRequest('saveItem', 'POST', payload);
            if (result.success) {
                // refresh data
                await loadAllData();
                return true;
            } else {
                alert("Error: " + (result.message || "Could not save"));
                return false;
            }
        } catch (err) {
            alert("Network error: " + err.message);
            return false;
        }
    }

    async function deleteItem(section, id) {
        if (!confirm("Are you sure you want to delete this entry?")) return false;
        try {
            const result = await apiRequest('deleteItem', 'POST', { section, id });
            if (result.success) {
                await loadAllData();
                return true;
            } else {
                alert("Delete failed");
                return false;
            }
        } catch (err) {
            alert("Error: " + err.message);
            return false;
        }
    }

    // render two column layout
    function renderCV() {
        const grid = document.getElementById('cvGrid');
        if (!grid) return;
        // left column (0) and right column (1)
        let leftHtml = '';
        let rightHtml = '';
        
        for (let cfg of sectionsConfig) {
            const sectionKey = cfg.key;
            const entries = appData[sectionKey] || [];
            const sectionCard = `
                <div class="section-card" data-section="${sectionKey}">
                    <div class="card-header">
                        <h2><i class="${cfg.icon}"></i> ${cfg.label}</h2>
                        <button class="btn-add" onclick="openAddModal('${sectionKey}')"><i class="fas fa-plus-circle"></i> Add</button>
                    </div>
                    <div class="items-list" id="list-${sectionKey}">
                        ${entries.length === 0 ? '<div style="padding: 16px; text-align:center; color:#94a3b8;">— No entries — <br> Click Add to insert</div>' : ''}
                        ${entries.map(item => `
                            <div class="item" data-id="${item.id}">
                                <div class="item-content">
                                    <div class="item-title">${escapeHtml(item.title)}</div>
                                    <div class="item-detail">${escapeHtml(item.description).replace(/\n/g, '<br>')}</div>
                                </div>
                                <div class="item-actions">
                                    <button class="btn-edit" onclick="openEditModal('${sectionKey}', ${item.id}, '${escapeHtml(item.title).replace(/'/g, "\\'")}', '${escapeHtml(item.description).replace(/'/g, "\\'")}')"><i class="fas fa-pen"></i> Edit</button>
                                    <button class="btn-delete" onclick="deleteItemHandler('${sectionKey}', ${item.id})"><i class="fas fa-trash-alt"></i> Delete</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            if (cfg.column === 0) {
                leftHtml += sectionCard;
            } else {
                rightHtml += sectionCard;
            }
        }
        
        grid.innerHTML = `
            <div class="left-col">${leftHtml}</div>
            <div class="right-col">${rightHtml}</div>
        `;
    }

    // Helper escapeHtml
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Modal handling
    let currentModalCallback = null;
    const modal = document.getElementById('itemModal');
    const modalTitleElem = document.getElementById('modalTitle');
    const modalSectionInput = document.getElementById('modalSection');
    const modalIdInput = document.getElementById('modalId');
    const entryTitleInput = document.getElementById('entryTitle');
    const entryDescInput = document.getElementById('entryDescription');

    function openAddModal(section) {
        modalTitleElem.innerText = `➕ Add New Entry to ${getSectionLabel(section)}`;
        modalSectionInput.value = section;
        modalIdInput.value = '';
        entryTitleInput.value = '';
        entryDescInput.value = '';
        modal.style.display = 'flex';
    }

    function openEditModal(section, id, currentTitle, currentDesc) {
        modalTitleElem.innerText = `✏️ Edit Entry in ${getSectionLabel(section)}`;
        modalSectionInput.value = section;
        modalIdInput.value = id;
        entryTitleInput.value = currentTitle;
        entryDescInput.value = currentDesc;
        modal.style.display = 'flex';
    }

    function getSectionLabel(sectionKey) {
        const found = sectionsConfig.find(c => c.key === sectionKey);
        return found ? found.label : sectionKey;
    }

    async function onSaveModal() {
        const section = modalSectionInput.value;
        const id = modalIdInput.value ? parseInt(modalIdInput.value) : null;
        const title = entryTitleInput.value.trim();
        const description = entryDescInput.value.trim();
        if (!title) {
            alert("Please fill the title field.");
            return;
        }
        const success = await saveItem(section, id, title, description);
        if (success) {
            closeModal();
        }
    }

    function closeModal() {
        modal.style.display = 'none';
        modalSectionInput.value = '';
        modalIdInput.value = '';
        entryTitleInput.value = '';
        entryDescInput.value = '';
    }

    window.deleteItemHandler = async (section, id) => {
        await deleteItem(section, id);
    };

    window.openAddModal = openAddModal;
    window.openEditModal = openEditModal;

    // attach modal events
    document.getElementById('modalSaveBtn').addEventListener('click', onSaveModal);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    window.onclick = function(e) {
        if (e.target === modal) closeModal();
    };

    // initial load
    loadAllData();
</script>

<!-- ========== BACKEND PHP + MySQL CODE (include in api.php file) ========== -->
<!-- 
    Create a file named "api.php" in same directory.
    Also create MySQL database named "cv_editor" with table "cv_entries".
    
    SQL Schema:
    
    CREATE DATABASE cv_editor;
    USE cv_editor;
    
    CREATE TABLE cv_entries (
        id INT AUTO_INCREMENT PRIMARY KEY,
        section_key VARCHAR(50) NOT NULL,
        title VARCHAR(255) NOT NULL,
        description TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    Then copy the PHP code below into api.php 
    (Make sure to update DB credentials if needed)
-->
</body>
</html>
